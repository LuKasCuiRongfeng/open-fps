name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}"
            echo "Expected format: v<semver>, for example v0.1.1 or v0.1.1-rc.1"
            exit 1
          fi

  build-and-upload:
    name: Release ${{ matrix.target }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    needs: validate-tag
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: editor
            platform: windows
            runs_on: windows-latest
            release_command: pnpm run tauri:release:editor
            asset_glob: |
              src-tauri/target-editor/release/bundle/nsis/*.exe
              src-tauri/target-editor/release/bundle/msi/*.msi
          - target: game
            platform: windows
            runs_on: windows-latest
            release_command: pnpm run tauri:release:game
            asset_glob: |
              src-tauri/target-game/release/bundle/nsis/*.exe
              src-tauri/target-game/release/bundle/msi/*.msi
          - target: editor
            platform: linux
            runs_on: ubuntu-22.04
            release_command: node scripts/run-tauri-target.mjs build editor --ci --bundles appimage,deb
            asset_glob: |
              src-tauri/target-editor/release/bundle/appimage/*.AppImage
              src-tauri/target-editor/release/bundle/deb/*.deb
          - target: game
            platform: linux
            runs_on: ubuntu-22.04
            release_command: node scripts/run-tauri-target.mjs build game --ci --bundles appimage,deb
            asset_glob: |
              src-tauri/target-game/release/bundle/appimage/*.AppImage
              src-tauri/target-game/release/bundle/deb/*.deb
          - target: editor
            platform: macos
            runs_on: macos-latest
            release_command: node scripts/run-tauri-target.mjs build editor --ci --no-sign --bundles dmg
            asset_glob: |
              src-tauri/target-editor/release/bundle/dmg/*.dmg
          - target: game
            platform: macos
            runs_on: macos-latest
            release_command: node scripts/run-tauri-target.mjs build game --ci --no-sign --bundles dmg
            asset_glob: |
              src-tauri/target-game/release/bundle/dmg/*.dmg

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version from tag
        run: pnpm run release:sync-version -- ${{ github.ref_name }}

      - name: Build release target
        run: ${{ matrix.release_command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.target }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-upload

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*