name: Target Pipelines

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify source and assets
        run: pnpm verify

  frontend:
    name: Frontend ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        target: [editor, game]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend target
        run: pnpm web build ${{ matrix.target }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.target }}
          path: dist-${{ matrix.target }}

  tauri:
    name: Tauri ${{ matrix.target }}
    runs-on: windows-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        target: [editor, game]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Tauri target
        run: pnpm desktop build ${{ matrix.target }} -- --ci --no-bundle

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: src-tauri/target-${{ matrix.target }}/release/open-fps-${{ matrix.target }}*